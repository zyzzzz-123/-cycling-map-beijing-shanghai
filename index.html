<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>清华大学到上海浦发有家申鸿苑骑行计划地图</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="sidebar" aria-label="骑行计划">
        <header class="trip-header">
          <h1>清华大学到浦发有家申鸿苑骑行计划</h1>
          <div class="stats">
            <span><strong>12</strong> 骑行日</span>
            <span><strong>约 120km</strong> 日均</span>
            <span><strong>约 1440km</strong></span>
          </div>
        </header>

        <div class="day-selector" id="day-selector" role="group" aria-label="选择骑行日"></div>

        <ol class="day-list" id="day-list"></ol>
      </section>

      <section class="map-area" aria-label="地图">
        <div id="fallback-map" class="fallback-map" aria-hidden="true"></div>
        <div id="map" class="map"></div>
        <aside class="legend">
          <span><i class="line-main"></i> 中低风险</span>
          <span><i class="line-hard"></i> 高风险</span>
          <span><i class="line-max"></i> 最高风险</span>
          <span><i class="dot overnight"></i> 住宿/终点</span>
          <span><i class="dot risk"></i> 重点排雷</span>
        </aside>
      </section>
    </main>

    <template id="day-template">
      <li class="day-card">
        <button class="day-button" type="button">
          <span class="day-index"></span>
          <span class="day-main">
            <strong class="day-route"></strong>
            <small class="day-meta"></small>
          </span>
        </button>
        <p class="day-note"></p>
        <dl class="day-detail">
          <div>
            <dt>住宿区域</dt>
            <dd class="day-lodging"></dd>
          </div>
          <div>
            <dt>当地吃什么</dt>
            <dd class="day-food"></dd>
          </div>
          <div>
            <dt>主要路线</dt>
            <dd class="day-roads"></dd>
          </div>
          <div>
            <dt>难点</dt>
            <dd class="day-risk"></dd>
          </div>
          <div>
            <dt>少骑/多骑备选</dt>
            <dd class="day-options"></dd>
          </div>
          <div>
            <dt>可考虑支线</dt>
            <dd class="day-detours"></dd>
          </div>
          <div>
            <dt>选择理由与替代线</dt>
            <dd class="day-why"></dd>
          </div>
        </dl>
      </li>
    </template>

    <script src="./config.public.js?v=20260625-1"></script>
    <script src="./app.js?v=20260626-7"></script>
  </body>
</html>
